<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Elara的小窝</title>
  <link rel="stylesheet" href="style.css">
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
  const postList = document.getElementById("post-list");

  const posts = [
    {
      title: "最近在学：算法与数据结构",
      path: "post/post1.html",
      preview: "这周重新翻了《剑指Offer》，感觉比第一次看顺多了...",
      tag: "学习笔记",
      date: "2025-10-14"
    },
    {
      title: "blog模板",
      path: "post/template.html",
      preview: "正文内容//存一个写博客的小模板...",
      tag: "模板",
      date: "2025-10-14"
    }
  ];

  // 生成 HTML（带时间戳）
  posts.forEach(p => {
    const article = document.createElement("article");
    article.innerHTML = `
      <h2><a href="${p.path}">${p.title}</a></h2>
      <div class="post-date">${p.date}</div>
      <p class="preview">${p.preview}</p>
      <span class="tag">#${p.tag}</span>
    `;
    postList.appendChild(article);
  });

  // 显示页面更新时间
  const modified = new Date(document.lastModified);
  const formatted = modified.toLocaleString("zh-CN", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
  document.getElementById("page-updated").textContent =
    "📅 页面最后更新：" + formatted;
});

  </script>
</head>

<body>
  <header>
    <h1>Elara的小窝</h1>
    <p>学习 · 项目 · 猫爪印记</p>
    <p id="page-updated" class="date"></p>
  </header>

  <main id="post-list"></main>

  <footer>
    © 2025 Elara | 🐈‍⬛
  </footer>
</body>
</html>
